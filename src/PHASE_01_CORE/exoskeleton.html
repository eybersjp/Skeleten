<!DOCTYPE html>
<html lang="en" class="bg-black text-white font-mono">
<head>
    <meta charset="UTF-8"><title>SKELETEN // EXO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes b { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .stl { animation: b 0.8s infinite; color: #FF5F1F; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #FF5F1F; }
    </style>
</head>
<body class="p-6 border-[12px] border-[#FF5F1F] min-h-screen">
    <header class="border-b-4 border-[#FF5F1F] mb-8 pb-4 flex justify-between items-end">
        <h1 class="text-7xl font-black tracking-tighter shadow-orange-500/50 drop-shadow-md">SKELETEN</h1>
        <div class="w-1/3">
            <input type="text" id="search" placeholder="FILTER_MATRIX..." class="w-full bg-zinc-900 border-2 border-zinc-700 text-white p-3 focus:outline-none focus:border-[#FF5F1F] placeholder-zinc-500 font-bold uppercase transition-colors" oninput="filterGrid()">
        </div>
    </header>
    <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full"></div>
    <script>
        let systemData = [];
        fetch('dist/skeleten_mnc.json').then(r => {
            if (!r.ok) return fetch('skeleten_mnc.json');
            return r;
        }).then(r => r.json()).then(d => {
            systemData = d.pts || [];
            if(d.about) systemData = d.about; // accommodate SoftwareSourceCode schema format
            renderGrid(systemData);
        }).catch(err => console.log('MNC load failed. Run Phase 1.', err));

        function renderGrid(pts) {
            const g = document.getElementById('grid');
            g.innerHTML = pts.map(p => {
                const isStale = p.stl || p.identifier === "STALE";
                const typ = p.typ || p.additionalType || "UNKNOWN";
                const nm = p.nm || p.name || "UNKNOWN";
                const inn = p.in || p.abstract || "NONE";
                const rat = p.rat || p.description || "NO_INTENT";
                return `<div class="card border-2 border-zinc-800 p-5 hover:border-[#FF5F1F] transition-all duration-200" data-nm="${nm.toUpperCase()}">
                    <div class="flex justify-between items-center font-bold text-xs mb-5">
                        <span class="bg-zinc-800 px-2 py-1">${typ}</span>
                        ${isStale ? '<span class="stl font-black tracking-widest">[!] STALE_INTENT</span>' : '<span class="text-green-500">[OK] FRESH</span>'}
                    </div>
                    <h2 class="text-3xl font-black mb-4 truncate" title="${nm}">${nm}</h2>
                    <table class="w-full text-xs mb-5 text-zinc-400 border-t border-b border-zinc-800 py-2 block">
                        <tr><td class="w-8 font-bold text-white">IN:</td><td class="truncate" title="${inn}">${inn}</td></tr>
                    </table>
                    <p class="text-xs italic text-zinc-300 border-l-2 border-zinc-600 pl-3 mb-6 h-12 overflow-hidden hover:overflow-visible">${rat}</p>
                    <button class="w-full border-2 border-white py-3 font-bold text-xs hover:bg-white hover:text-black transition-colors" onclick="copyToken('${nm}', '${typ}', '${inn}', '${rat}', ${isStale})">COPY_FOR_AI</button>
                </div>`;
            }).join('');
        }

        function filterGrid() {
            const term = document.getElementById('search').value.toUpperCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.nm.includes(term) ? 'block' : 'none';
            });
        }

        function copyToken(nm, typ, inn, rat, isStale) {
            const token = `\`\`\`json\n{\n  "name": "${nm}",\n  "type": "${typ}",\n  "params": "${inn}",\n  "rationale": "${rat}",\n  "status": "${isStale ? 'STALE' : 'FRESH'}"\n}\n\`\`\``;
            navigator.clipboard.writeText(token);
        }
    </script>
</body>
</html>
